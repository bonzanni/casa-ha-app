schema_version: 1
model: haiku
enabled: true
tools:
  # delegate_to_agent granted ON PURPOSE (no delegates.yaml — specialists are
  # forbidden one): probe S.1d proves a delegated child is ACL-judged by its
  # OWN (empty) declared set via origin execution_role, not its parent's.
  allowed: [Read, mcp__casa-framework__delegate_to_agent]
  disallowed: [Bash, Write, Edit, Agent, Task, WebFetch]
  permission_mode: acceptEdits
  max_turns: 3
mcp_server_names:
  - casa-framework
channels: []
session:
  strategy: ephemeral
  idle_timeout: 0
cwd: ""
