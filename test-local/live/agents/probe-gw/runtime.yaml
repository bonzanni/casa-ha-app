schema_version: 1
model: haiku
enabled: true
tools:
  allowed:
    - mcp__casa-framework__delegate_to_agent
  # A6 tool-surface hygiene: probe agents ship the explicit disallowed set.
  disallowed: [Bash, Write, Edit, Agent, Task, WebFetch]
  permission_mode: acceptEdits
  max_turns: 5
mcp_server_names:
  - casa-framework
memory:
  token_budget: 800
  read_strategy: cached
channels:
  - ha_voice
session:
  strategy: pooled
  idle_timeout: 300
cwd: ""
