  overrides: {}
delegates: []
executors: []
triggers: []
hooks:
  pre_tool_use: []
tts:
  tag_dialect: none
  error_phrases: {}
response:
  text:
    register: precise
  voice:
    register: spoken
  restricted_webhook:
    register: plain
persona:
  policy: required
  compatibility:
  - casa/judge@>=0.1.0 <1.0.0
requires:
  plugins: []
  tools: []
doctrine_file: doctrine.md
