# ha-prod-console project config for casa-ha-app.
# Schema: C:/Users/nicol/Projects/ha-prod-console/docs/project-config.md

host: n150-ha
base_url: https://agent.oudekamp.bonzanni.casa
addon_slug: c071ea9c_casa-agent
container: addon_c071ea9c_casa-agent

# The HA "SSH & Web Terminal" addon runs as unprivileged hassio (uid 1000).
# Docker socket ops require passwordless sudo; every remote command is
# prefixed accordingly.
ssh_prefix: "sudo -n "

# Casa uses X-Webhook-Signature with a bare hex digest (no `sha256=` prefix),
# per casa_core.py _verify_webhook. Default is GitHub-style X-Hub-Signature-256.
hmac_header: X-Webhook-Signature
hmac_format: "${HEX}"

secret_source:
  type: ssh-docker-exec
  container: addon_c071ea9c_casa-agent
  command: cat /data/webhook_secret
  cache_ttl_minutes: 60

probes:
  healthz:
    method: GET
    path: /healthz
    expect_status: 200

  turn-assistant:
    method: POST
    path: /invoke/assistant
    sign: hmac
    body_json: { prompt: "say 'probe ok'" }
    expect_status: 200
    expect_body_contains: probe ok

  voice-sse:
    method: POST
    path: /api/converse
    sign: hmac
    sse: true
    body_json: { prompt: "say 'probe ok'", scope_id: "probe-scope" }
    expect_events: [block, done]

smoke: [healthz, turn-assistant, voice-sse]

regression:
  - healthz
  - turn-assistant
  - voice-sse
