name: Deploy

# Container image pipeline for the Casa Agent app.
#
# Pull requests touching the app get a validation build (no push). Pushes to
# main build per-arch images, push them to GHCR (Cosign-signed via the
# builder actions), publish the multi-arch manifest — the generic name
# config.yaml's `image:` points at — and then cut the vX.Y.Z git tag +
# GitHub Release with the matching CHANGELOG section as notes.

on:
  push:
    branches: [main]
    paths:
      - "casa-agent/**"
      - ".github/workflows/deploy.yml"
  pull_request:
    paths:
      - "casa-agent/**"
      - ".github/workflows/deploy.yml"

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      architectures: ${{ steps.info.outputs.architectures }}
      build_matrix: ${{ steps.matrix.outputs.matrix }}
      image_name: ${{ steps.normalize.outputs.image_name }}
      registry_prefix: ${{ steps.normalize.outputs.registry_prefix }}
      name: ${{ steps.normalize.outputs.name }}
      description: ${{ steps.normalize.outputs.description }}
      url: ${{ steps.normalize.outputs.url }}
      version: ${{ steps.normalize.outputs.version }}
    steps:
      - uses: actions/checkout@v7

      - name: Get app information
        id: info
        uses: home-assistant/actions/helpers/info@master
        with:
          path: "./casa-agent"

      - name: Normalize app information
        id: normalize
        # The info helper returns scalars with their YAML quotes intact
        # (version "0.58.0" would become an invalid image tag). Unquoted
        # shell assignment strips them — same laundering the official
        # apps-example build-app.yaml does.
        run: |
          image=${{ steps.info.outputs.image }}
          echo "image_name=${image##*/}" >> "$GITHUB_OUTPUT"
          echo "registry_prefix=${image%/*}" >> "$GITHUB_OUTPUT"
          version=${{ steps.info.outputs.version }}
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          name=${{ steps.info.outputs.name }}
          echo "name=${name}" >> "$GITHUB_OUTPUT"
          description=${{ steps.info.outputs.description }}
          echo "description=${description}" >> "$GITHUB_OUTPUT"
          url=${{ steps.info.outputs.url }}
          if [[ -n "$url" && "$url" != "null" ]]; then
            echo "url=${url}" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare build matrix
        id: matrix
        uses: home-assistant/builder/actions/prepare-multi-arch-matrix@2026.06.0
        with:
          architectures: ${{ steps.info.outputs.architectures }}
          image-name: ${{ steps.normalize.outputs.image_name }}
          registry-prefix: ${{ steps.normalize.outputs.registry_prefix }}

  build:
    name: Build ${{ matrix.arch }} image
    needs: prepare
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write # Cosign keyless signing (OIDC)
      packages: write # push images to GHCR
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.build_matrix) }}
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Build image
        uses: home-assistant/builder/actions/build-image@2026.06.0
        with:
          arch: ${{ matrix.arch }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          context: "./casa-agent"
          image: ${{ matrix.image }}
          image-tags: |
            ${{ needs.prepare.outputs.version }}
            latest
          labels: |
            io.hass.type=app
            io.hass.name=${{ needs.prepare.outputs.name }}
            io.hass.description=${{ needs.prepare.outputs.description }}
            io.hass.url=${{ needs.prepare.outputs.url }}
          push: ${{ github.event_name == 'push' }}
          version: ${{ needs.prepare.outputs.version }}

  manifest:
    name: Publish multi-arch manifest
    needs: [prepare, build]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Cosign keyless signing (OIDC)
      packages: write # push the manifest to GHCR
    steps:
      - name: Publish multi-arch manifest
        uses: home-assistant/builder/actions/publish-multi-arch-manifest@2026.06.0
        with:
          architectures: ${{ needs.prepare.outputs.architectures }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image-name: ${{ needs.prepare.outputs.image_name }}
          image-tags: |
            ${{ needs.prepare.outputs.version }}
            latest
          registry-prefix: ${{ needs.prepare.outputs.registry_prefix }}

  release:
    name: Tag + GitHub Release
    needs: [prepare, manifest]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the tag + release
    env:
      GH_TOKEN: ${{ github.token }}
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v7

      - name: Create release once per version
        run: |
          if [ -n "$(git ls-remote --tags origin "refs/tags/v${VERSION}")" ]; then
            echo "tag v${VERSION} already exists — skipping release"
            exit 0
          fi
          # Notes = the CHANGELOG section for this version.
          awk -v ver="${VERSION}" '
            $0 ~ "^## \\[" ver "\\]" {found=1; print; next}
            found && /^## \[/ {exit}
            found {print}
          ' casa-agent/CHANGELOG.md > /tmp/notes.md
          if [ ! -s /tmp/notes.md ]; then
            echo "Release v${VERSION}. See casa-agent/CHANGELOG.md." > /tmp/notes.md
          fi
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file /tmp/notes.md
