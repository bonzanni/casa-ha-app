name: QA
on:
  push:
    branches: [master, main]
  pull_request:
  schedule:
    - cron: "0 4 * * *"     # 04:00 UTC daily
  workflow_dispatch: {}     # manual trigger from any branch

jobs:
  tier1-smoke:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push'
      || github.event_name == 'pull_request'
      || github.event_name == 'schedule'
      || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -f test-local/Dockerfile.test -t casa-test .
      - name: Smoke
        run: bash test-local/e2e/test_smoke.sh
      - name: Voice SSE
        run: bash test-local/e2e/test_voice_sse.sh
      - name: Voice WS
        run: |
          pip install aiohttp
          bash test-local/e2e/test_voice_ws.sh

  tier2-functional:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push'
      || github.event_name == 'pull_request'
      || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r casa-agent/requirements.txt pytest pytest-asyncio anyio
      - name: Unit pytest (today's filter)
        run: python -m pytest tests/ -v -m "unit and not docker and not slow" --tb=short
      - name: Build image
        run: docker build -f test-local/Dockerfile.test -t casa-test .
      - name: Invoke sessions
        run: bash test-local/e2e/test_invoke_sessions.sh
      - name: SQLite memory
        run: bash test-local/e2e/test_sqlite_memory.sh
      - name: External surface
        run: bash test-local/e2e/test_external_surface.sh
      - name: Delegation
        run: bash test-local/e2e/test_specialist_delegation.sh
      - name: E2E - scheduling
        run: bash test-local/e2e/test_scheduling.sh
      - name: Engagement E-block
        run: |
          pip install aiohttp
          bash test-local/e2e/test_engagement_E.sh
      - name: Delegation E-block
        run: bash test-local/e2e/test_delegation_E.sh
      - name: HA delegation
        run: |
          pip install aiohttp
          bash test-local/e2e/test_ha_delegation.sh
      # P-block stays disabled until v0.14.10's D/P-block sweep ships.
      # When re-enabled, uncomment the step below (env vars stay):
      # - name: Engagement P-block
      #   env:
      #     CASA_USE_MOCK_CLAUDE: "1"
      #     CASA_PLAN_4B: "1"
      #   run: bash test-local/e2e/test_engagement_P.sh

  baseline-runtime:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push'
      || github.event_name == 'pull_request'
      || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r casa-agent/requirements.txt pytest pytest-asyncio anyio
      - name: Baseline runtime CI assertion
        run: python -m pytest tests/test_baseline_runtime_assert.py -v -m "unit and docker" --tb=short

  tier3-hardening:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'schedule'
      || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r casa-agent/requirements.txt pytest pytest-asyncio anyio
      - name: Slow pytest
        # `|| true` is intentional and temporary: until Half 2 audits the
        # 954 unmarked tests + decides which @slow are real vs Windows-only
        # flakes, we don't want a single broken @slow test breaking nightly.
        run: python -m pytest tests/ -v -m "slow" --tb=short || true
      - name: Build image
        run: docker build -f test-local/Dockerfile.test -t casa-test .
      - name: Concurrency
        run: bash test-local/e2e/test_concurrency.sh
      - name: MCP restart survival
        env:
          CASA_USE_MOCK_CLAUDE: "1"
        run: bash test-local/e2e/test_mcp_restart_survival.sh
      # D-block stays disabled until v0.14.10's D/P-block sweep ships.
      # When re-enabled, uncomment the step below (env var stays):
      # - name: Engagement D-block
      #   env:
      #     CASA_USE_MOCK_CLAUDE: "1"
      #   run: bash test-local/e2e/test_engagement_D.sh
