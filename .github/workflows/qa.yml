name: QA
on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r casa-agent/requirements.txt pytest pytest-asyncio anyio
      - run: python -m pytest tests/ -v -m "unit and not docker and not slow" --tb=short

  e2e-fast:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -f test-local/Dockerfile.test -t casa-test .
      - name: Smoke
        run: bash test-local/e2e/test_smoke.sh
      - name: Migration
        run: bash test-local/e2e/test_migration.sh
      - name: Invoke sessions
        run: bash test-local/e2e/test_invoke_sessions.sh
      - name: Concurrency
        run: bash test-local/e2e/test_concurrency.sh
      - name: Voice SSE
        run: bash test-local/e2e/test_voice_sse.sh
      - name: Voice WS
        run: |
          pip install aiohttp
          bash test-local/e2e/test_voice_ws.sh
      - name: SQLite memory
        run: bash test-local/e2e/test_sqlite_memory.sh
      - name: External surface (5.7)
        run: bash test-local/e2e/test_external_surface.sh
      - name: Delegation
        run: bash test-local/e2e/test_specialist_delegation.sh
      - name: Engagement (Plan 2)
        run: |
          pip install aiohttp
          bash test-local/e2e/test_engagement.sh
      - name: MCP restart survival (Plan 4b/3.6)
        env:
          CASA_USE_MOCK_CLAUDE: "1"
        run: bash test-local/e2e/test_mcp_restart_survival.sh
      - name: E2E - scheduling
        run: bash test-local/e2e/test_scheduling.sh

  baseline-runtime:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r casa-agent/requirements.txt pytest pytest-asyncio anyio
      - name: Baseline runtime CI assertion
        run: python -m pytest tests/test_baseline_runtime_assert.py -v -m "unit and docker" --tb=short
