name: Feature request
description: Suggest an idea for Casa
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the situation where Casa falls short today.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: What would you like to happen?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Alternatives or additional context
      description: Workarounds you use today, related issues, examples from other tools.
