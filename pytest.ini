[pytest]
asyncio_mode = auto
markers =
    unit: fast, dependency-free unit tests (legacy/optional since v0.64.2 — the gate is opt-out: unmarked tests run by default)
    slow: tests that take a long time (opt-out: excluded from the default CI gate)
    docker: requires Docker (opt-out: excluded from the default CI gate; run via make test-docker)
