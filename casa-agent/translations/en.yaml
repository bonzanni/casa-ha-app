configuration:
  claude_oauth_token:
    name: Claude OAuth Token
    description: >-
      OAuth token for the Claude Agent SDK. Run "claude setup-token" on your
      local machine to obtain one. Required.
  telegram_bot_token:
    name: Telegram Bot Token
    description: >-
      Bot token from Telegram @BotFather. Enables the Telegram channel.
  telegram_chat_id:
    name: Telegram Chat ID
    description: >-
      Restrict Telegram messages to this chat ID. Leave empty to accept all.
  telegram_webhook_url:
    name: Telegram Webhook URL
    description: >-
      Public URL for Telegram webhook mode (e.g. https://your-ha.duckdns.org:8080).
      When set, Telegram pushes updates instead of polling. Lower latency, zero
      idle requests. Leave empty to use polling (works behind NAT).
  telegram_delivery_mode:
    name: Telegram Delivery Mode
    description: >-
      How responses are displayed in Telegram.
      "stream" shows the response building in real-time (edit-in-place).
      "block" waits for the full response before sending.
  honcho_api_url:
    name: Honcho API URL
    description: >-
      URL for the Honcho memory service. Defaults to the managed service.
  honcho_api_key:
    name: Honcho API Key
    description: >-
      API key for Honcho. When set, enables persistent cross-session memory.
  webhook_auth_enabled:
    name: Enable Webhook Authentication
    description: >-
      When enabled, all webhook, invoke, and Telegram webhook requests require
      authentication. A secret is auto-generated on first enable if none is set.
      Retrieve it from /data/webhook_secret via the web terminal.
  webhook_secret:
    name: Webhook Secret (override)
    description: >-
      Optional manual override for the webhook secret. Leave empty to use the
      auto-generated one. Used as HMAC key for Casa webhooks and as Telegram's
      secret_token for webhook mode.
  primary_agent_name:
    name: Primary Agent Name
    description: >-
      Display name for the primary agent. Injected into its personality prompt.
  voice_agent_name:
    name: Voice Agent Name
    description: >-
      Display name for the voice agent. Injected into its personality prompt.
  primary_agent_model:
    name: Primary Agent Model
    description: >-
      Claude model for the primary agent. Opus is most capable, Haiku is fastest.
  voice_agent_model:
    name: Voice Agent Model
    description: >-
      Claude model for the voice agent. Haiku recommended for low latency.
  subagent_model:
    name: Subagent Model
    description: >-
      Claude model used by on-demand subagents (automation-builder, plugin-builder, etc.).
  heartbeat_enabled:
    name: Enable Heartbeat
    description: >-
      Periodically prompt the primary agent to check for pending tasks and events.
  heartbeat_interval_minutes:
    name: Heartbeat Interval (minutes)
    description: >-
      How often the heartbeat fires, in minutes. Range: 15 to 1440.
  enable_terminal:
    name: Enable Web Terminal
    description: >-
      Expose a web terminal in the ingress panel for shell access to the container.
  repos:
    name: Workspace Repositories
    description: >-
      Git repositories to clone into the workspace. Cloned on first boot, pulled on restart.
