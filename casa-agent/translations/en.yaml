configuration:
  public_url:
    name: Public URL
    description: >-
      The public-facing base URL for this app (e.g. https://your-ha.duckdns.org:18065).
      Required for Telegram webhook mode and future callback integrations.
      Enable the external port (18065) and set up port forwarding first.
      Leave empty if the app is only accessed via the HA UI.
  claude_oauth_token:
    name: Claude OAuth Token
    description: >-
      OAuth token for the Claude Agent SDK. Run "claude setup-token" on your
      local machine to obtain one. Required.
  telegram_bot_token:
    name: Telegram Bot Token
    description: >-
      Bot token from Telegram @BotFather. Enables the Telegram channel.
  telegram_chat_id:
    name: Telegram Chat ID
    description: >-
      Restrict Telegram messages to this chat ID. Leave empty to accept all.
  telegram_transport:
    name: Telegram Transport
    description: >-
      How the bot receives messages. "polling" works behind NAT (default).
      "webhook" requires a public_url and has lower latency. If webhook is
      selected but public_url is not set, falls back to polling.
  telegram_delivery_mode:
    name: Telegram Delivery Mode
    description: >-
      How responses are displayed in Telegram.
      "stream" shows the response building in real-time (edit-in-place).
      "block" waits for the full response before sending.
  telegram_rich_text:
    name: Rich Text in Telegram
    description: >-
      Render Markdown (bold, italic, inline code, and monospace code blocks) in
      agent replies. Disable to send all replies as plain text.
  onepassword_service_account_token:
    name: "1Password service account token"
    description: "Token from https://developer.1password.com/docs/service-accounts/ — plaintext only, cannot be a op:// reference (root of trust). Read access to the vault named in 'onepassword_default_vault'."
  onepassword_default_vault:
    name: "1Password default vault"
    description: "Vault name used when an op:// reference omits the vault segment. Default: Casa."
  webhook_auth_enabled:
    name: Enable Webhook Authentication
    description: >-
      When enabled, all webhook, invoke, and Telegram webhook requests require
      authentication. A secret is auto-generated on first enable if none is set.
      Retrieve it from /data/webhook_secret via the web terminal.
  webhook_secret:
    name: Webhook Secret (override)
    description: >-
      Optional manual override for the webhook secret. Leave empty to use the
      auto-generated one. Used as HMAC key for Casa webhooks and as Telegram's
      secret_token for webhook mode.
  context7_api_key:
    name: Context7 API Key
    description: >-
      API key for the bundled Context7 documentation plugin (part of the
      plugin-developer toolbox). Leave empty to run without it; Context7
      lookups will be unavailable until set.
  primary_agent_model:
    name: Primary Agent Model
    description: >-
      Claude model for the primary agent. Opus is most capable, Haiku is fastest.
  voice_agent_model:
    name: Voice Agent Model
    description: >-
      Claude model for the voice agent. Haiku recommended for low latency.
  enable_terminal:
    name: Enable Web Terminal
    description: >-
      Expose a web terminal in the ingress panel for shell access to the container.
  sdk_client_pool:
    name: Reuse Warm SDK Clients
    description: >-
      Reuse a warm Claude SDK client across resident turns instead of
      reconnecting every turn (faster replies). Disable only to fall back to
      per-turn sessions when diagnosing issues.
  tina_ha_facade_enabled:
    name: Use Tina's Fast Home Assistant Tools
    description: >-
      Keep Tina's Home Assistant tools connected and ready for lower voice
      latency. Disable to use the raw Home Assistant MCP fallback while
      diagnosing compatibility issues.
  telegram_engagement_supergroup_id:
    name: "Telegram engagement supergroup chat ID"
    description: |
      Chat ID of the dedicated Telegram forum supergroup used to host
      interactive engagements (Tier 2 Specialists in interactive mode;
      Tier 3 Executor types, Plan 3+). Must be a negative integer
      (Telegram supergroup chat IDs are always negative). Leave at 0
      to disable engagement features; Casa still boots.
  telegram_bot_api_base:
    name: "Telegram Bot API base URL"
    description: "Override the Telegram Bot API endpoint (e.g. a self-hosted Bot API server). Leave blank for api.telegram.org."
  hindsight_api_url:
    name: Hindsight API URL
    description: >-
      Base URL of a Hindsight semantic-memory server (e.g.
      http://192.168.1.10:8888). Setting this is the single toggle for
      long-term memory; leave empty to run without it.
  casa_tz:
    name: Timezone
    description: >-
      IANA timezone for schedules and agent clocks (e.g. Europe/Amsterdam).
      Unknown values fall back to Europe/Amsterdam with a warning.
  engagement_reap_days:
    name: Engagement Auto-Close Days
    description: >-
      Engagements with no activity for this many days are automatically
      cancelled and their Telegram topic closed (daily sweep). Set 0 to
      disable. Defaults to 7.
  log_level:
    name: Log Level
    description: >-
      Log verbosity for the Casa services (debug, info, warning, error).
      Defaults to info.
  voice_turn_budget_seconds:
    name: "Voice Turn Budget (seconds)"
    description: >-
      Maximum seconds a synchronous specialist delegation may run during a
      voice turn before Casa gives up and returns early, leaving room for
      the voice transport's own timeout. Hard-capped at 27 regardless of
      this value. Defaults to 27.
  voice_route_freshness_seconds:
    name: "Voice Route Freshness (seconds)"
    description: >-
      Grace period during which Gary may accept a background specialist job
      after its authenticated Home Assistant route disconnects. Range 0-300.
      Defaults to 60.
  voice_job_delivery_ttl_seconds:
    name: "Maximum Voice Job Delivery TTL (seconds)"
    description: >-
      Maximum retention period for background voice-job results and failures
      while delivery is pending. A specialist may request a shorter expiry.
      Range 30-3600. Defaults to 900.
  voice_job_route_cap:
    name: "Voice Job Route Cap"
    description: >-
      Maximum active or ready specialist jobs retained for one authenticated
      Home Assistant voice route. Range 1-20. Defaults to 5.
  specialist_max_concurrency:
    name: "Specialist Max Concurrency"
    description: >-
      Maximum number of specialist delegations allowed in flight at once
      across the whole fleet. A given voice/chat scope may still only have
      one active delegation to the same specialist (not configurable).
      Defaults to 2.
  specialist_cost_alert_threshold:
    name: "Specialist Cost Alert Threshold (USD)"
    description: >-
      Cumulative per-specialist USD spend past which Casa logs a warning
      on every further delegation to that specialist. Defaults to 5.0.
