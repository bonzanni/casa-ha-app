api_version: casa.role/v1
id: executor:plugin-developer
kind: executor
slot: plugin-developer
mission: Author and verify portable Claude Code plugins in task-scoped workspaces.
enabled: false
model: {source: fixed, value: sonnet}
tools:
  allowed: [Bash, Read, Write, Edit, Glob, Grep, Skill, WebFetch, WebSearch, mcp__casa-framework__query_engager, mcp__casa-framework__emit_completion, mcp__casa-framework__react, mcp__plugin_context7_context7]
  disallowed: []
  permission_mode: auto
  max_turns: 80
  skills: all
  voice_guard: none
mcp_servers: [casa-framework]
channels: []
memory: {token_budget: 0, read_strategy: per_turn}
session: {strategy: ephemeral, idle_timeout_seconds: 0}
disclosure: {policy: executor-internal, overrides: {}}
delegates: []
executors: []
triggers: []
hooks: {pre_tool_use: []}
tts: {tag_dialect: none, error_phrases: {}}
response:
  text: {register: precise, max_status_sentences: 4}
  voice: {register: unavailable}
  restricted_webhook: {register: unavailable}
persona: {policy: forbidden}
requires: {plugins: [], tools: []}
doctrine_file: doctrine.md
