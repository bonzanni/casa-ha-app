api_version: casa.role/v1
id: resident:assistant
kind: resident
slot: assistant
mission: Coordinate household work, communication, specialists, and executors.
enabled: true
model:
  source: ha_option
  option: primary_agent_model
  default: opus
  allowed: [opus, sonnet, haiku]
tools:
  allowed: [Read, Write, Edit, Bash, Skill, mcp__casa-framework__cancel_engagement, mcp__casa-framework__cleanup_engagement_topics, mcp__casa-framework__delegate_to_agent, mcp__casa-framework__engage_executor, mcp__casa-framework__ask_user, mcp__casa-framework__get_schedule, mcp__casa-framework__recall_memory, mcp__casa-framework__send_message, mcp__casa-framework__send_media]
  disallowed: []
  permission_mode: acceptEdits
  max_turns: 20
  skills: all
  voice_guard: none
mcp_servers: [casa-framework]
channels: [telegram, webhook]
memory: {token_budget: 5000, read_strategy: per_turn}
session: {strategy: persistent, idle_timeout_seconds: 86400}
disclosure: {policy: standard, overrides: {}}
delegates: []
executors: []
triggers: []
hooks: {pre_tool_use: []}
tts: {tag_dialect: none, error_phrases: {}}
response:
  text: {register: conversational, max_confirmation_sentences: 2, max_status_sentences: 3}
  voice: {register: spoken, max_confirmation_sentences: 1, max_status_sentences: 2, first_clause_max_words: 8, first_clause_requires_early_punctuation: true}
  restricted_webhook: {register: plain, max_status_sentences: 2}
persona:
  policy: required
  compatibility:
    - casa.bootstrap/ellen@0.1.0
    - casa.personas/*@>=1.0.0 <2.0.0
requires: {plugins: [], tools: []}
doctrine_file: doctrine.md
