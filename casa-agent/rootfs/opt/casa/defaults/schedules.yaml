tasks: []

heartbeat:
  enabled: true
  interval_minutes: 60
  agent: ellen
  channel: telegram
  prompt: |
    This is your periodic heartbeat. Reflect on your current state:

    1. Check if there are any pending tasks or follow-ups you committed to
    2. Check if any scheduled events are coming up in the next hour
    3. Review if any notifications or results arrived while idle
    4. Consider if there's anything proactive you should do for Nicola

    If there's nothing actionable, stay quiet -- do NOT send a message.
    If there IS something, take action or notify Nicola via Telegram.
