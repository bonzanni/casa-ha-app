schema_version: 1
pre_tool_use:
  - policy: block_dangerous_bash
  - policy: path_scope
    writable:
      - /config/agents
      - /config/policies
      - /config/workspace
    readable:
      - /config
      - /opt/casa/defaults
  - policy: casa_config_guard
    forbid_delete_residents: true
    forbid_write_paths:
      - /data
      - /config/schema
      - /opt/casa
  - policy: commit_size_guard
    max_files: 20
