schema_version: 1
type: configurator
description: |
  Configure Casa: create/update/delete Specialists, Executors, and their
  YAMLs; edit policies; add/update/remove triggers; wire/unwire delegates.
  Commits changes via config_git and reloads Casa (soft or hard per
  reload.md doctrine) on completion.
model: sonnet
driver: in_casa
enabled: true
tools:
  # v0.101.0 round-2 W1 (Sol+Terra ratified): NO Bash — the configurator has
  # no legitimate shell dependency (recipes use typed tools + Read/Write/
  # Edit/Grep/Glob), and argv inspection can never close the script-writer/
  # unmodeled-binary bypass class. This list feeds ClaudeAgentOptions.
  # allowed_tools (agent_loader.load_all_executors -> tools_allowed ->
  # tools._build_executor_options). Keep the canonical role.yaml in sync.
  allowed:
    - Read
    - Write
    - Edit
    - Glob
    - Grep
    - mcp__casa-framework__config_git_commit
    - mcp__casa-framework__casa_reload
    - mcp__casa-framework__casa_reload_triggers
    - mcp__casa-framework__casa_restart_supervised
    - mcp__casa-framework__query_engager
    - mcp__casa-framework__emit_completion
    # Engagement-topic cleanup (v0.65.0) — configurator-only; see doctrine/architecture.md.
    - mcp__casa-framework__cleanup_engagement_topics
    # Plugin lifecycle (unified plugin architecture §3.13) — see
    # doctrine/recipes/plugin/. The registry is the single assignment authority.
    - mcp__casa-framework__plugin_add
    - mcp__casa-framework__plugin_update
    - mcp__casa-framework__plugin_assign
    - mcp__casa-framework__plugin_unassign
    - mcp__casa-framework__plugin_remove
    # Release B — plugin webhook-trigger consent off-switch (immediate 404).
    - mcp__casa-framework__trigger_ack_revoke
    - mcp__casa-framework__plugin_list
    - mcp__casa-framework__verify_plugin_state
    - mcp__casa-framework__set_plugin_env_reference
    - mcp__casa-framework__list_vault_items
    - mcp__casa-framework__get_item_fields
    # Personality Phase A component lifecycle (#210 root cause, v0.101.0):
    # these were added to role.yaml only — THIS file is what the runtime
    # enforces (see the chain comment above), so the live configurator had
    # no typed install path and fell back to hand-authoring. The two lists
    # are equality-tested (test_capability_parity.py) so they cannot drift
    # again.
    - mcp__casa-framework__resident_persona_swap
    - mcp__casa-framework__resident_persona_reset
    - mcp__casa-framework__specialist_install_inspect
    - mcp__casa-framework__specialist_install_commit
    - mcp__casa-framework__specialist_upgrade
    - mcp__casa-framework__specialist_rollback
    - mcp__casa-framework__specialist_uninstall
    - mcp__casa-framework__persona_install_inspect
    - mcp__casa-framework__persona_install_commit
    - mcp__casa-framework__persona_apply
  permission_mode: acceptEdits
mcp_server_names:
  - casa-framework
idle_reminder_days: 7
prompt_template_file: prompt.md
hooks_file: hooks.yaml
observer_policy_file: observer.yaml
doctrine_dir: doctrine
memory:
  enabled: true
  token_budget: 2000
