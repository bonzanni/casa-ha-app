schema_version: 1
type: configurator
description: |
  Configure Casa: create/update/delete Specialists, Executors, and their
  YAMLs; edit policies; add/update/remove triggers; wire/unwire delegates.
  Commits changes via config_git and reloads Casa (soft or hard per
  reload.md doctrine) on completion.
model: sonnet
driver: in_casa
enabled: true
tools:
  allowed:
    - Read
    - Write
    - Edit
    - Bash
    - Glob
    - Grep
    - mcp__casa-framework__config_git_commit
    - mcp__casa-framework__casa_reload
    - mcp__casa-framework__casa_reload_triggers
    - mcp__casa-framework__query_engager
    - mcp__casa-framework__emit_completion
  permission_mode: acceptEdits
mcp_server_names:
  - casa-framework
idle_reminder_days: 7
prompt_template_file: prompt.md
hooks_file: hooks.yaml
observer_policy_file: observer.yaml
doctrine_dir: doctrine
