schema_version: 1
pre_tool_use:
  - policy: block_dangerous_bash
  - policy: path_scope
    writable:
      - /data/engagements/
    readable:
      - /data/engagements/
      - /opt/claude-seed
      - /addon_configs/casa-agent/cc-home/.claude/plugins/cache
  - policy: commit_size_guard
    max_files: 50
  - policy: self_containment_guard
  - policy: engagement_permission_relay
    matcher: ".*"
    timeout: 600       # 10 min - operator-response budget (C-1 spec §4.6)
