schema_version: 1
pre_tool_use:
  - policy: block_dangerous_bash
  - policy: path_scope
    writable:
      - /data/engagements/
    readable:
      - /data/engagements/
      # v0.71.0: read-only access to the content-addressed plugin store, so
      # the plugin-developer can inspect its --plugin-dir'd plugins. The old
      # /opt/claude-seed + cc-home plugin cache are gone (marketplace removed).
      - /config/plugins/store
  - policy: commit_size_guard
    max_files: 50
  - policy: self_containment_guard
  # R4 (v0.89.0, buttons-always): forward Skill loads to the internal resolver
  # so it can inject the buttons-always reminder when a sub-skill (e.g.
  # superpowers:brainstorming) loads inside an active engagement. Wired to the
  # engagement_buttons_reminder policy (live deps -> casa_core wiring; no
  # HOOK_POLICIES factory, so build_policy_callbacks_from_hooks_yaml skips it
  # and the resolver falls back to the wired default). Trigger = Skill identity
  # + engagement-from-cwd, never message content.
  - policy: engagement_buttons_reminder
    matcher: Skill
  - policy: engagement_permission_relay
    matcher: ".*"
    timeout: 600       # 10 min - operator-response budget (C-1 spec §4.6)
