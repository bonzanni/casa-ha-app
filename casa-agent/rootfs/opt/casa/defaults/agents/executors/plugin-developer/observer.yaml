schema_version: 1
classifier_overrides:
  - pattern: "Bash.*git (push|commit|add|status|log|diff)"
    label: peek
  - pattern: "Bash.*gh (repo|auth)"
    label: peek
  - pattern: "Bash.*rm -rf"
    label: trigger
  - pattern: "Bash.*git reset --hard"
    label: trigger
rate_limit: 3
default_interjection_mode: notify
