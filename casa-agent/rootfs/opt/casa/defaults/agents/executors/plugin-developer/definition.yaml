schema_version: 1
type: plugin-developer
description: |
  Author Claude Code plugins in dedicated per-plugin GitHub repos, using
  superpowers workflow (brainstorming → spec → plan → execute), with agent
  dispatch, web/GitHub research, and Telegram-mediated interaction. Produces
  100% CC-native plugins (no Casa-specific file formats) — installable into
  Casa agents via Configurator or into any regular CC session via the normal
  CC install flow.
model: sonnet
driver: claude_code
enabled: false          # flipped to true by a follow-up user config once Casa tests pass
tools:
  allowed:
    - mcp__casa-framework__query_engager
    - mcp__casa-framework__emit_completion
    # v0.46.4: broad Bash — the builder must run/test what it writes across
    # open-ended toolchains (python/pytest/uv/npm/ruff/tsc/make/...). An
    # allowlist can't cover dev, so safety lives in the hook stack
    # (block_dangerous_bash + path_scope to /data/engagements/ + the
    # engagement_permission_relay), not in Bash verbs. git push still triggers
    # self_containment_guard (PreToolUse hook, fires regardless of allow-list).
    # Dev sandbox (isolate where this runs) is on the roadmap.
    - Bash
    - Read
    - Write
    - Edit
    - Glob
    - Grep
    - Skill
    # v0.46.4: current-docs / research — the builder had no doc/web access and
    # was coding from stale memory. context7 (structured library docs) follows
    # in v0.46.5 (needs an MCP .mcp.json driver change).
    - WebFetch
    - WebSearch
  permission_mode: auto
mcp_server_names:
  - casa-framework
idle_reminder_days: 7
prompt_template_file: prompt.md
hooks_file: hooks.yaml
observer_policy_file: observer.yaml
doctrine_dir: doctrine
extra_dirs: []
mirror_chat_to_topic: true
