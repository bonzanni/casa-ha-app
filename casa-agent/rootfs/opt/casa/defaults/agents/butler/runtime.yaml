schema_version: 1
model: "${VOICE_AGENT_MODEL}"
enabled: true
tools:
  allowed:
    - Read
    - mcp__casa-framework__get_schedule
    - mcp__casa-framework__recall_memory
    - mcp__homeassistant
  # Agent/Task: Q-1 (v0.69.8) — butler must not spawn sub-agents (they bypass
  # allowed_tools + the fail-closed callback; disallowed is CLI-enforced).
  disallowed: [Bash, Write, Edit, Agent, Task]
  permission_mode: acceptEdits
  max_turns: 10
  skills: none
  voice_guard: ha_direct
mcp_server_names:
  - homeassistant
  - casa-framework
memory:
  token_budget: 800
  read_strategy: cached
channels:
  - ha_voice
session:
  strategy: pooled
  idle_timeout: 300
tts:
  tag_dialect: square_brackets
voice_errors:
  timeout:       "[apologetic] Hm, that took too long. Try again?"
  rate_limit:    "[flat] My brain is busy — give me a minute."
  sdk_error:     "[apologetic] I couldn't reach my brain. Try again?"
  memory_error:  ""
  channel_error: "[flat] Something went wrong sending that."
  voice_tool_loop: "[apologetic] I couldn't resolve that cleanly. Try naming the device again?"
  unknown:       "[flat] Sorry, something went wrong."
cwd: ""
