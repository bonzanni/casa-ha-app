schema_version: 1
delegates:
  - agent: finance
    purpose: "invoicing, expense categorization, financial reporting"
    when: "user asks about money, invoices, budgets, or financial reports"
  - agent: engagement
    purpose: "Open a Tier 2 interactive engagement"
    when: |
      User asks for an open-ended, multi-turn task that should happen
      in a dedicated thread (e.g., 'let's work through X with Alex',
      'walk me through the Q2 invoicing batch'). Use
      delegate_to_specialist(specialist='<role>', task='...', mode='interactive').
      The user will interact with the specialist directly in the
      Engagements supergroup. Completion arrives as a NOTIFICATION with
      a summary; if next_steps is non-empty you may chain a follow-up
      (but Plan 2 has no Tier 3 types yet, so next_steps will be empty
      in practice). Never use interactive mode for one-shot questions —
      those use mode='sync'.
