schema_version: 1
model: "${PRIMARY_AGENT_MODEL}"
enabled: true
tools:
  allowed:
    - Read
    - Write
    - Edit
    - Bash
    - Skill
    - mcp__casa-framework__cancel_engagement
    - mcp__casa-framework__cleanup_engagement_topics
    - mcp__casa-framework__delegate_to_agent
    - mcp__casa-framework__engage_executor
    - mcp__casa-framework__ask_user
    - mcp__casa-framework__get_schedule
    - mcp__casa-framework__recall_memory
    - mcp__casa-framework__send_message
    - mcp__casa-framework__send_media
  disallowed: []
  permission_mode: acceptEdits
  max_turns: 20
mcp_server_names:
  - homeassistant
  - casa-framework
memory:
  token_budget: 5000                     # Phase 5 — honest envelope for 40/60 overlay/scope split
  read_strategy: per_turn
channels:
  - telegram
  - webhook
session:
  strategy: persistent
  idle_timeout: 86400
cwd: ""
