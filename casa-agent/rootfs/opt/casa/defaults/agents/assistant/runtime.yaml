schema_version: 1
model: "${PRIMARY_AGENT_MODEL}"
enabled: true
tools:
  allowed:
    - Read
    - Write
    - Edit
    - Bash
    - Skill
    - mcp__casa-framework__cancel_engagement
    - mcp__casa-framework__consult_other_agent_memory   # M6 — cross-role recall
    - mcp__casa-framework__delegate_to_agent
    - mcp__casa-framework__engage_executor
    - mcp__casa-framework__get_schedule
    - mcp__casa-framework__send_message
  disallowed: []
  permission_mode: acceptEdits
  max_turns: 20
mcp_server_names:
  - homeassistant
  - casa-framework
memory:
  token_budget: 5000                     # Phase 5 — honest envelope for 40/60 overlay/scope split
  cross_peer_token_budget: 2000          # M6 — consult_other_agent_memory budget
  read_strategy: per_turn
  scopes_owned: [personal, business, finance]
  scopes_readable: [personal, business, finance, house, meta]
  default_scope: personal
channels:
  - telegram
  - webhook
session:
  strategy: persistent
  idle_timeout: 86400
cwd: ""
