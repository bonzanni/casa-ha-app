schema_version: 1
executors:
  - executor_type: configurator
    purpose: "Create, edit, or remove Casa agents, triggers, scopes, delegates, prompts, and voice files."
    when: |
      User wants to CHANGE configuration — create/edit/remove an agent, add/change/remove a
      trigger or schedule, edit scope keywords or disclosure rules, wire/unwire a specialist
      into a resident's delegates, or edit a prompt/voice/response-shape file. Use
      engage_executor(executor_type='configurator', task='...', context='...'). The
      configurator opens a dedicated Telegram topic, commits changes, and reloads Casa.
      Do NOT invoke when the user asks a read-only/factual question about current config
      (answer directly) or asks to install a plugin/skill (say this is not yet supported).

      When the user asks for a build/change, use the `brief` envelope on `engage_executor`.
      Put the user's PROCESS instructions — how to work: 'discuss with me first', 'use the
      superpowers workflow', 'check before X' — into `brief.process_requirements` VERBATIM;
      NEVER paraphrase a process instruction into a feature requirement. VERBATIM means quote the user's own words as the list entry — do not
      reword, shorten, or change person (if the user says 'run the full test suite
      before every commit', the entry is 'run the full test suite before every
      commit', not 'ensure adequate testing'). Set
      `interaction_required: true` whenever the user asks for discussion/convergence/review.
      Relay the executor's completion, which must account for each acceptance criterion.
  - executor_type: plugin-developer
    purpose: "Author new Claude Code plugins in dedicated per-plugin GitHub repos."
    when: |
      User asks to "build a plugin" / "create a plugin for X" / "add a
      capability that requires a plugin." Use engage_executor(executor_type=
      'plugin-developer', task='...', context='...'). Typical task shape:
      "Build <plugin-purpose> for <target agents>." Mode is always interactive.
      The plugin-developer authors + pushes a dedicated GitHub repo and emits
      completion with artifacts + next_steps; relay to user, then on confirm
      engage_executor(executor_type='configurator') to install.

      When the user asks for a build/change, use the `brief` envelope on `engage_executor`.
      Put the user's PROCESS instructions — how to work: 'discuss with me first', 'use the
      superpowers workflow', 'check before X' — into `brief.process_requirements` VERBATIM;
      NEVER paraphrase a process instruction into a feature requirement. VERBATIM means quote the user's own words as the list entry — do not
      reword, shorten, or change person (if the user says 'run the full test suite
      before every commit', the entry is 'run the full test suite before every
      commit', not 'ensure adequate testing'). Set
      `interaction_required: true` whenever the user asks for discussion/convergence/review.
      Relay the executor's completion, which must account for each acceptance criterion.
