schema_version: 1
executors:
  - executor_type: configurator
    purpose: "Create, edit, or remove Casa agents, triggers, scopes, delegates, prompts, and voice files; install/upgrade/rollback/uninstall specialists from repositories, add/update/remove plugins from repositories, install personas from repositories, apply an installed persona to a resident or specialist, and reset a resident to its image-default persona."
    when: |
      User wants to CHANGE configuration — create/edit/remove an agent, add/change/remove a
      trigger or schedule, edit scope keywords or disclosure rules, wire/unwire a specialist
      into a resident's delegates, or edit a prompt/voice/response-shape file. ALSO engage the
      configurator for repository-component lifecycle, and note each kind's verbs differ:
      SPECIALIST — install / upgrade / rollback / uninstall from a repository;
      PLUGIN — add / update / remove from a repository;
      PERSONA — install from a repository; APPLY an already-installed persona to a resident
      OR a specialist; RESET a resident to its image-default persona (reset is residents-only
      and restores the built-in default — it is not a persona-content operation). Personas
      have NO upgrade and NO uninstall; apply operates on an installed persona, not a fresh
      repo fetch. Repository locator shape owner/repo@ref, e.g.
      "install the finance specialist from bonzanni/casa-finance-specialist@v0.1.0". Engage the
      configurator via engage_executor(executor_type='configurator', ...) using the `brief`
      envelope described below — do not hand-construct a bare task string. The
      configurator opens a dedicated Telegram topic, commits changes, and reloads Casa.
      DISTINCTION: to INSTALL an EXISTING repository component (a published specialist, plugin, or
      persona) → configurator (this card); to CREATE/BUILD a NEW plugin from scratch →
      plugin-developer (see that card). Do NOT invoke when the user asks a read-only/factual
      question about current config (answer directly).

      When the user asks for a build/change, use the `brief` envelope on `engage_executor`.
      Put the user's PROCESS instructions — how to work: 'discuss with me first', 'use the
      superpowers workflow', 'check before X' — into `brief.process_requirements` VERBATIM;
      NEVER paraphrase a process instruction into a feature requirement. VERBATIM means quote the user's own words as the list entry — do not
      reword, shorten, or change person (if the user says 'run the full test suite
      before every commit', the entry is 'run the full test suite before every
      commit', not 'ensure adequate testing'). Set
      `interaction_required: true` whenever the user asks for discussion/convergence/review.
      Relay the executor's completion, which must account for each acceptance criterion.
  - executor_type: plugin-developer
    purpose: "Author new Claude Code plugins in dedicated per-plugin GitHub repos."
    when: |
      User asks to "build a plugin" / "create a plugin for X" / "add a
      capability that requires a plugin." Engage_executor(executor_type=
      'plugin-developer', ...) using the `brief` envelope described below — do
      not hand-construct a bare task string. Typical task shape:
      "Build <plugin-purpose> for <target agents>." Mode is always interactive.
      The plugin-developer authors + pushes a dedicated GitHub repo and emits
      completion with artifacts + next_steps; relay to user, then on confirm
      engage_executor(executor_type='configurator') to install.

      When the user asks for a build/change, use the `brief` envelope on `engage_executor`.
      Put the user's PROCESS instructions — how to work: 'discuss with me first', 'use the
      superpowers workflow', 'check before X' — into `brief.process_requirements` VERBATIM;
      NEVER paraphrase a process instruction into a feature requirement. VERBATIM means quote the user's own words as the list entry — do not
      reword, shorten, or change person (if the user says 'run the full test suite
      before every commit', the entry is 'run the full test suite before every
      commit', not 'ensure adequate testing'). Set
      `interaction_required: true` whenever the user asks for discussion/convergence/review.
      Relay the executor's completion, which must account for each acceptance criterion.
