schema_version: 1
model: sonnet
enabled: false
tools:
  allowed: [Read, Skill, mcp__casa-framework__get_schedule, mcp__casa-framework__send_media]
  disallowed: [Bash, Write, Edit]
  permission_mode: acceptEdits
  max_turns: 10
mcp_server_names:
  - n8n-workflows
  - casa-framework
memory:
  token_budget: 4000        # opt in to specialist memory (recall/retain on the shared casa bank at inherited clearance)
  read_strategy: per_turn   # cached not yet supported for specialists
channels: []
session:
  strategy: ephemeral
  idle_timeout: 0
cwd: ""
